<p class="video-title">
  30 Queens. Can Martin Win?
</p>

<style>
    .subscribe-button
    {
      background-color: rgb(230, 0, 0); 
      color: white;
      border: none;
      height: 36px;
      width: 105px;
      border-radius: 2px;
      cursor: pointer;
      margin-right: 8px;
      transition: background-color 0.3s;
    }

    .subscribe-button:hover
    {
      background-color: rgb(190, 0, 0);
    }
    /* hover effect (pseudo-class) */

    .subscribe-button:active
    {
      background-color: rgb(250, 0, 0);
      opacity: 0.8; /* a 0 az teljesen atlatszo, a 1 pedig teljesen lathato */
    }

    .join-button
    {
      background-color: white;
      color: rgb(13, 13, 255);
      border-color: rgb(13, 13, 255);
      border-style: solid;
      border-width: 1px;
      height: 36px;
      width: 62px;
      border-radius: 2px;
      cursor: pointer;
      margin-right: 8px;
      transition: background-color 0.3s, color 0.3s;
    }
    .join-button:hover
    {
      background-color: rgb(13, 13, 255);
      color: white;
    }
    .tweet-button
    {
      background-color: rgb(29, 161, 242);
      color: white;
      border: none;
      height: 36px;
      width: 70px;
      border-radius: 18px;
      cursor: pointer;
      font-weight: bold;
      font-size: 15px;
      transition: box-shadow 0.2s;
    }
    .tweet-button:hover
    {
      box-shadow: 4px 4px 15px rgba(0, 0, 0, 0.15);
    }
    /* a 3. value a homalyossag */
    /* rgba = red, green, blue, alpha (opacity) */
    .video-title
    {
      font-size: 20px;
      font-weight: bold;
      color: rgb(0, 0, 0);
      margin-bottom: 15px;
    }
</style>
<!-- Cascading Style Sheets, magyarul: „lépcsőzetes stíluslapok” -->
<!-- css properties -->
<!-- color: text color -->
<!-- cursor: pointer: indicates a clickable button -->
<!-- margin = space -->
<!-- border-radius: a height fele lehet max és akkor lesz kerek -->

<button class="subscribe-button">
  SUBSCRIBE
</button>

<button class = "join-button">
  JOIN
</button>

<button class = "tweet-button">
  Tweet
</button>
